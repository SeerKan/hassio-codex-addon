name: Builder

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-app:
    name: Build codex_agent
    permissions:
      contents: read
      id-token: write
      packages: write
    uses: ./.github/workflows/build-app.yaml
    with:
      app: codex_agent
      publish: ${{ github.event_name == 'push' }}
    secrets: inherit
